spring.application.name=spring_security

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/springbootdb
spring.datasource.username=gduser
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
#org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy : 카멜케이스 => 스네이크 케이스
#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl