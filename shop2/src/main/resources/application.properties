#springboot 환경 설정 파일. application.yml 형식으로도 가능함
spring.application.name=shop2

#debug=true
#기본포트 : 8080
#server.port=8000

#mariadb 설정
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/springdb
spring.datasource.username=gduser
spring.datasource.password=1234

spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.read-only=false
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.maximum-pool-size=20

#fileupload 
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

#jsp view 
#spring.mvc.view.prefix=/WEB-INF/views/
#spring.mvc.view.suffix=.jsp

#message
spring.messages.basename=messages
spring.messages.encoding=UTF-8

#개발자 환경값
resources.dir=D:/20251222/springboot/workspace/shop2/src/main/resources/
board.upload.dir=D:/20251222/springboot/workspace/shop2/src/main/resources/static/board/

## OpenAI
# ${OPENAI_API_KEY} : 환경변수에 설정이 필요
spring.ai.openai.api-key=${OPENAI_API_KEY}


